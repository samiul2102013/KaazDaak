services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - default

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: ghcr.io/${GITHUB_REPOSITORY:-kaazdaak}/web:${IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - default

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - default

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - default

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: ghcr.io/${GITHUB_REPOSITORY:-kaazdaak}/web:${IMAGE_TAG:-latest}
    command: celery -A config worker -l info -Q default,high_priority
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - default

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: ghcr.io/${GITHUB_REPOSITORY:-kaazdaak}/web:${IMAGE_TAG:-latest}
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - default

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: ghcr.io/${GITHUB_REPOSITORY:-kaazdaak}/web:${IMAGE_TAG:-latest}
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - default

volumes:
  pgdata:
  redisdata:
  static_volume:
  media_volume:

networks:
  default:
    name: app-network
